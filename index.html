<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究生导师智能推荐系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="workspace-body">

<nav class="navbar navbar-dark bg-dark-custom px-4 app-navbar">
    <a class="navbar-brand fw-bold fs-5" href="#">研究生导师智能推荐系统</a>
    <div class="navbar-actions">
        <a class="btn btn-outline-light btn-sm fw-bold me-2" href="favorites.html">
            心仪导师
        </a>
        <button class="btn btn-compare btn-sm fw-bold" id="btnShowCompare" disabled>
            横向对比 (<span id="compareCount">0</span>)
        </button>
    </div>
</nav>

<div class="d-flex workspace-container">
    <aside class="sidebar bg-white border-end pt-3">
        <div class="sidebar-label px-3 mb-2 small fw-bold">功能模块</div>
        <ul class="nav flex-column nav-pills custom-nav-pills px-2">
            <li class="nav-item mb-1">
                <a class="nav-link active" href="#resultsPanel">意向筛选</a>
            </li>
            <li class="nav-item mb-1">
                <a class="nav-link" href="favorites.html">心仪导师</a>
            </li>
        </ul>
    </aside>

    <section class="form-panel bg-white border-end p-4 custom-scrollbar">
        <div class="panel-eyebrow">筛选条件</div>
        <h5 class="fw-bold mb-2">筛选条件</h5>
        <p class="panel-help mb-4">选择地区和职称，输入研究兴趣，系统会基于真实导师信息完成匹配。</p>
        <form id="recommendForm">
            <div class="mb-3">
                <label class="form-label fw-semibold text-muted small" for="provinceInput">目标省份</label>
                <select class="form-select custom-input" id="provinceInput">
                    <option value="南京">南京</option>
                    <option value="云南">云南</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold text-muted small" for="titleInput">导师职称</label>
                <select class="form-select custom-input" id="titleInput">
                    <option value="不限">不限</option>
                    <option value="教授">教授</option>
                    <option value="副教授">副教授</option>
                    <option value="讲师">讲师</option>
                    <option value="研究员">研究员</option>
                    <option value="副研究员">副研究员</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-muted small" for="directionInput">研究方向</label>
                <textarea class="form-control custom-input" id="directionInput" rows="5" placeholder="如：有机化学、天然药物化学、新闻传播理论、传播社会学、网络舆论" required></textarea>
                <div class="form-hint mt-2">示例来自当前导师数据，可输入多个研究方向关键词。</div>
            </div>

            <button type="submit" class="btn btn-theme w-100 btn-lg" id="submitBtn">
                <span id="btnText">开始匹配导师</span>
                <span id="loadingSpinner" class="spinner-border spinner-border-sm text-light d-none ms-1" role="status"></span>
            </button>
        </form>
    </section>

    <main class="result-panel flex-grow-1 bg-light p-4 custom-scrollbar">
        <section id="resultsPanel" class="mb-4">
            <div class="section-head d-flex justify-content-between align-items-center gap-3 mb-3">
                <div>
                    <div class="panel-eyebrow">推荐结果</div>
                    <h5 class="fw-bold mb-0">匹配结果预览</h5>
                </div>
                <span class="status-pill" id="resultStatus">等待输入条件</span>
            </div>
            <div id="resultsContainer" class="row">
                <div class="col-12 text-center text-muted mt-5 pt-5 empty-state">
                    <p class="mt-2">请在左侧填写条件并点击匹配</p>
                </div>
            </div>
        </section>

    </main>
</div>

<div class="modal fade" id="compareModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header compare-modal-header">
                <h5 class="modal-title fw-bold">导师横向对比</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body p-0">
                <div class="p-3 border-bottom bg-white">
                    <button class="btn btn-theme btn-sm" id="btnCompareAdvice" type="button">
                        生成智能对比建议
                    </button>
                    <div id="compareAdviceBox" class="ai-advice-box d-none mt-3"></div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover mb-0 text-center align-middle compare-table" id="compareTable"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
